<!-- DOCTYPE html-->
<html lang="en" data-lang="en">
<head>   
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandra's Craft Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #F7F4EA;
      --surface:    #DED9E2;
      --accent-1:   #C0B9DD;
      --accent-2:   #80A1D4;
      --accent-3:   #75C9C8;
      --text:       #2D2A35;
      --text-muted: #6B6575;
      --radius:     1rem;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1.15rem;
      line-height: 1.75;
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 5rem;
    }

    h1, h2, h3 {
      font-family: var(--font-display);
      line-height: 1.2;
    }

    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.3rem; }

    p, li {
      font-size: 1.1rem;
      max-width: 60ch;
    }

    /* Bigger tap targets — critical for 60+ users on phones */
    .tab-btn {
      min-height: 56px;
      min-width: 56px;
      font-size: 0.85rem;
      padding: 0.5rem 0.25rem;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* Language toggle button — easy to tap */
    #langToggle {
      font-size: 1rem;
      padding: 0.6rem 1.2rem;
      min-height: 48px;
    }

    /* Cards — generous padding so content feels open */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* Tags under herb/recipe titles */
    .tag {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0.25rem 0 0.75rem;
      letter-spacing: 0.02em;
    }

    /* Step lists in recipes — numbered, spaced out */
    ol.steps li {
      font-size: 1.1rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    /* Ingredient lists */
    ul.ingredients li {
      font-size: 1.1rem;
      padding: 0.3rem 0;
    }

    /* Section headers */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--accent-2);
      margin: 1.5rem 0 1rem;
    }

    .hidden { display: none; }

    .details {
      margin-top: 0.75rem;
      padding: 1rem;
      border-radius: 0.75rem;
      background: rgba(255,255,255,0.5);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.7;
    }

    .details p { margin-bottom: 0.4rem; max-width: 100%; }

    .more-btn {
      margin-top: 0.75rem;
      background: var(--accent-2);
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .more-btn:hover { background: var(--accent-3); }
  </style>
</head>
<body>
  <!-- Top bar -->
  <header style="background: var(--accent-2); color: white; padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
    <h1 style="font-size: 1.4rem;">🌿 Sandra's Craft Garden</h1>
    <button id="langToggle" onclick="toggleLang()"
      style="background: var(--accent-3); border: none; color: white; padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.9rem; cursor: pointer;">
      🌐 Español
    </button>
  </header>
